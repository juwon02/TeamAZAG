name: teamazag-opsradar

services:
  db:
    build:
      context: ./opsradar2
      dockerfile: docker/db/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-azag_db}
      POSTGRES_USER: ${POSTGRES_USER:-azag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:?Set APP_ADMIN_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - backend
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: ./opsradar2
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-azag}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-azag_db}
      DB_SCHEMA: opsradar2
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:8002}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-26214400}
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      AZURE_OPENAI_MAX_RETRIES: ${AZURE_OPENAI_MAX_RETRIES:-3}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${APP_BIND_ADDRESS:-0.0.0.0}:${APP_PORT:-8002}:8002"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,sys,urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8002/api/v1/system/health', timeout=5)); sys.exit(0 if data.get('status') == 'ok' else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  uploads_data:

networks:
  backend:
    driver: bridge
