  <style>
    .canvas { fill: #fff; }
    .grid { fill: url(#grid); }
    .title { font: 700 27px Arial, sans-serif; fill: #182033; }
    .subtitle { font: 400 13px Arial, sans-serif; fill: #69738d; }
    .table-bg { fill: #fff; stroke: #cfd8ea; stroke-width: 1.2; filter: url(#shadow); }
